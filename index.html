<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DA DONS — Drum & Bass Beat-Em-Up</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#000; width:100%; height:100%; overflow:hidden; touch-action:none; }
  #root { width:100%; height:100%; }
  @keyframes glow  { from{box-shadow:0 0 4px #ffcc00} to{box-shadow:0 0 22px #ffcc00,0 0 44px #ff6600} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  @keyframes vu    { 0%,100%{transform:scaleY(0.2)} 50%{transform:scaleY(1)} }
  @keyframes spin  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  button { cursor:pointer; font-family:'Courier New',monospace; }
  .img-frame { border:2px solid #6600cc; box-shadow:0 0 18px #9900ff88; }

<script type="text/babel">
const { useEffect, useRef, useState, useCallback } = React;

// ═══════════════════════════════════════════════════════════════
//  IMAGE GENERATOR — calls Anthropic API to generate portraits
// ═══════════════════════════════════════════════════════════════
const IMAGE_PROMPTS = {
  title: `Ultra dramatic digital artwork for a game called "DA DONS". Dark underground rave scene at night, neon purple and gold lighting, graffiti-covered warehouse walls, massive sound system speakers, vinyl records spinning in the air, microphones, musical notes floating, silhouettes of tough street fighters in fighting stances, golden glow title treatment, cinematic wide angle, 80s arcade beat-em-up aesthetic meets drum and bass rave culture, explosive energy, highly detailed, dark moody atmosphere with bursts of neon colour`,
  promis: `Gritty hyper-realistic portrait of a tough white British man in his mid 40s named Promis. He is balding with short ginger hair on the sides, weathered face, strong jaw, intense eyes, wearing a dark hoodie and gold chain. Underground rave fighter aesthetic. Dark background with gold and purple neon glow. Confident aggressive expression. Street fighter character portrait style. High detail, dramatic lighting from below.`,
  change: `Gritty hyper-realistic portrait of a tough white British man in his mid 40s named Change. He is completely bald, shaved head, weathered face, hard stare, wearing a dark tracksuit top. Underground rave fighter aesthetic. Dark background with green neon glow. Intimidating expression. Street fighter character portrait style. High detail, dramatic side lighting.`,
  em: `Gritty hyper-realistic portrait of a tough white British man in his mid 40s named Em. He is balding with short black hair on the sides, weathered face, sharp eyes, wearing a snapback cap pushed back and a dark jacket. Underground rave fighter aesthetic. Dark background with cyan and blue neon glow. Focused aggressive expression. Street fighter character portrait style. High detail, dramatic lighting.`,
};

async function generateImage(prompt, size='512x512') {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 1024,
        messages: [{
          role: 'user',
          content: `Generate an image: ${prompt}\n\nRespond ONLY with a data URL (data:image/png;base64,...) of a generated image. Actually, I need you to create an SVG illustration instead since we cannot generate actual images here. Create a detailed, stylised SVG illustration that captures the essence of this description. Return ONLY the SVG code, nothing else, no markdown, no explanation.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    // Extract SVG if present
    const svgMatch = text.match(/<svg[\s\S]*<\/svg>/i);
    if (svgMatch) return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgMatch[0]);
    return null;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════════
//  FALLBACK CANVAS PORTRAITS (drawn in code if API fails)
// ═══════════════════════════════════════════════════════════════
function drawTitleArt(canvas) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  // Dark underground bg
  const bg = ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,'#050010'); bg.addColorStop(0.5,'#0a0020'); bg.addColorStop(1,'#000');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  // Neon light beams
  [[0.2,'#9900ff'],[0.5,'#ffcc00'],[0.8,'#9900ff']].forEach(([x,c])=>{
    const g=ctx.createRadialGradient(w*x,0,0,w*x,0,h*0.8);
    g.addColorStop(0,c+'55'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
  });

  // Speaker circles in corners
  [[0.08,0.15],[0.92,0.15],[0.08,0.85],[0.92,0.85]].forEach(([x,y])=>{
    for(let r=30;r>5;r-=8){
      ctx.beginPath(); ctx.arc(w*x,h*y,r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(153,0,255,${0.3+r/100})`; ctx.lineWidth=2; ctx.stroke();
    }
  });

  // Vinyl record
  ctx.save(); ctx.translate(w*0.75, h*0.35);
  for(let r=55;r>5;r-=6){
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=r%12<6?'#222':'#333'; ctx.lineWidth=2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fillStyle='#ffcc00'; ctx.fill();
  ctx.restore();

  // Silhouette fighters
  const drawFighter = (x,y,col,facing) => {
    ctx.save(); ctx.translate(x,y); if(!facing) ctx.scale(-1,1);
    ctx.fillStyle=col;
    // body
    ctx.fillRect(-8,-40,16,24);
    // head
    ctx.beginPath(); ctx.arc(0,-48,12,0,Math.PI*2); ctx.fill();
    // punch arm
    ctx.fillRect(8,-36,22,7);
    // legs
    ctx.fillRect(-8,-16,7,20); ctx.fillRect(1,-16,7,20);
    ctx.restore();
  };
  drawFighter(w*0.25, h*0.72, '#ffcc0088', true);
  drawFighter(w*0.5,  h*0.68, '#00ff6688', false);
  drawFighter(w*0.72, h*0.72, '#00ffee88', true);

  // Floating music notes
  [['♩',0.15,0.3,'#ffcc00'],['♪',0.6,0.2,'#9900ff'],['♫',0.85,0.5,'#00ffee'],['♬',0.35,0.6,'#ff6600']].forEach(([n,x,y,c])=>{
    ctx.fillStyle=c; ctx.font=`bold ${24}px serif`; ctx.fillText(n, w*x, h*y);
  });

  // Title text
  ctx.fillStyle='#ffcc00';
  ctx.shadowColor='#ffcc00'; ctx.shadowBlur=20;
  ctx.font=`bold ${Math.floor(h*0.22)}px 'Courier New',monospace`;
  ctx.textAlign='center'; ctx.fillText('DA', w/2, h*0.42);
  ctx.font=`bold ${Math.floor(h*0.18)}px 'Courier New',monospace`;
  ctx.fillText('DONS', w/2, h*0.62);
  ctx.shadowBlur=0; ctx.textAlign='left';

  // Bottom stripe
  const stripe=ctx.createLinearGradient(0,0,w,0);
  ['#f00','#ff0','#0f0','#0ff','#00f','#f0f','#f00'].forEach((c,i)=>stripe.addColorStop(i/6,c));
  ctx.fillStyle=stripe; ctx.fillRect(0,h*0.68,w,4);
}

function drawCharPortrait(canvas, charName, hairCol, bald, col) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;

  // BG gradient
  const bg = ctx.createRadialGradient(w/2,h*0.4,10,w/2,h*0.4,w*0.8);
  bg.addColorStop(0, col+'33'); bg.addColorStop(1,'#050008');
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  // Neon glow behind head
  const haloG = ctx.createRadialGradient(w/2,h*0.32,5,w/2,h*0.32,w*0.45);
  haloG.addColorStop(0,col+'44'); haloG.addColorStop(1,'transparent');
  ctx.fillStyle=haloG; ctx.fillRect(0,0,w,h);

  // Neck
  ctx.fillStyle='#d4956a';
  ctx.fillRect(w/2-14,h*0.54,28,h*0.2);

  // Shoulders / body
  ctx.fillStyle='#1a1a2e';
  ctx.beginPath();
  ctx.moveTo(0,h); ctx.lineTo(0,h*0.62);
  ctx.quadraticCurveTo(w*0.15,h*0.52,w*0.28,h*0.56);
  ctx.lineTo(w*0.34,h*0.56); ctx.lineTo(w*0.34,h);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w,h); ctx.lineTo(w,h*0.62);
  ctx.quadraticCurveTo(w*0.85,h*0.52,w*0.72,h*0.56);
  ctx.lineTo(w*0.66,h*0.56); ctx.lineTo(w*0.66,h);
  ctx.fill();
  ctx.fillRect(w*0.34,h*0.56,w*0.32,h*0.44);

  // Gold chain (for Promis)
  if (charName==='PROMIS') {
    ctx.strokeStyle='#ffcc00'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(w/2,h*0.68,22,0.2,Math.PI-0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(w/2,h*0.69,14,0,Math.PI); ctx.stroke();
  }

  // Face
  ctx.fillStyle='#d4956a';
  ctx.beginPath(); ctx.ellipse(w/2,h*0.35,w*0.22,h*0.26,0,0,Math.PI*2); ctx.fill();

  // Jaw shadow
  ctx.fillStyle='#a0704a';
  ctx.beginPath(); ctx.ellipse(w/2,h*0.48,w*0.18,h*0.08,0,0,Math.PI*2); ctx.fill();

  // Ear left
  ctx.fillStyle='#c4856a';
  ctx.beginPath(); ctx.ellipse(w/2-w*0.22,h*0.35,6,10,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(w/2+w*0.22,h*0.35,6,10,0,0,Math.PI*2); ctx.fill();

  // Hair
  if (!bald) {
    ctx.fillStyle=hairCol;
    // Side hair
    ctx.beginPath();
    ctx.ellipse(w/2-w*0.2,h*0.28,8,16,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w/2+w*0.2,h*0.28,8,16,0,0,Math.PI*2); ctx.fill();
    // Back of head hair
    ctx.beginPath(); ctx.arc(w/2,h*0.18,w*0.18,Math.PI*0.8,Math.PI*2.2); ctx.fill();
    // Top bald patch
    ctx.fillStyle='#d4956a';
    ctx.beginPath(); ctx.ellipse(w/2,h*0.17,w*0.12,h*0.06,0,0,Math.PI*2); ctx.fill();
  }
  // Stubble
  ctx.fillStyle='#8b6050'; ctx.font=`10px monospace`;
  if (bald) {
    // bald shine
    const shine=ctx.createRadialGradient(w/2-10,h*0.16,2,w/2-10,h*0.16,20);
    shine.addColorStop(0,'rgba(255,255,255,0.4)'); shine.addColorStop(1,'transparent');
    ctx.fillStyle=shine; ctx.fillRect(0,0,w,h*0.4);
  }

  // Eyes
  [[w/2-w*0.09,h*0.32],[w/2+w*0.09,h*0.32]].forEach(([ex,ey])=>{
    ctx.fillStyle='#222'; ctx.beginPath(); ctx.ellipse(ex,ey,8,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.ellipse(ex-2,ey-1,2,2,0,0,Math.PI*2); ctx.fill();
    // Eyebrow
    ctx.strokeStyle='#5a3a2a'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ex-9,ey-8); ctx.lineTo(ex+8,ey-10); ctx.stroke();
  });

  // Nose
  ctx.fillStyle='#a0704a';
  ctx.beginPath(); ctx.moveTo(w/2,h*0.36); ctx.lineTo(w/2-5,h*0.43); ctx.lineTo(w/2+5,h*0.43); ctx.fill();

  // Mouth — determined expression
  ctx.strokeStyle='#7a4030'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(w/2-10,h*0.47); ctx.lineTo(w/2+10,h*0.47); ctx.stroke();

  // Neon glow border at bottom
  ctx.fillStyle=col;
  ctx.shadowColor=col; ctx.shadowBlur=15;
  ctx.fillRect(0,h-4,w,4);
  ctx.shadowBlur=0;

  // Name
  ctx.fillStyle=col; ctx.font=`bold 11px 'Courier New',monospace`;
  ctx.textAlign='center';
  ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.fillText(charName, w/2, h-10);
  ctx.shadowBlur=0; ctx.textAlign='left';
}

// ═══════════════════════════════════════════════════════════════
//  AUDIO ENGINE
// ═══════════════════════════════════════════════════════════════
const Audio = (() => {
  let AC=null,master=null,verb=null,timers=[],current=null,trackGain=null,userVol=0.7;
  function boot(){
    if(AC)return;
    AC=new(window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain();master.gain.value=userVol;
    verb=AC.createConvolver();
    const rl=AC.sampleRate*1.4,rb=AC.createBuffer(2,rl,AC.sampleRate);
    for(let c=0;c<2;c++){const d=rb.getChannelData(c);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,3.2);}
    verb.buffer=rb;
    const vg=AC.createGain();vg.gain.value=0.16;verb.connect(vg);vg.connect(master);master.connect(AC.destination);
  }
  function newTG(){
    if(trackGain){trackGain.gain.setTargetAtTime(0,AC.currentTime,0.08);}
    trackGain=AC.createGain();trackGain.gain.value=1;trackGain.connect(master);return trackGain;
  }
  const res=()=>{if(AC&&AC.state==='suspended')AC.resume();};
  const vol=v=>{userVol=v;if(master)master.gain.value=v;};
  function noise(dur){const n=Math.ceil(AC.sampleRate*dur),b=AC.createBuffer(1,n,AC.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=Math.random()*2-1;const s=AC.createBufferSource();s.buffer=b;return s;}
  const tg=()=>trackGain||master;
  function kick(t,v=0.88){const o=AC.createOscillator(),g=AC.createGain(),ws=AC.createWaveShaper();const c=new Float32Array(512);for(let i=0;i<512;i++){const x=i/256-1;c[i]=1.5*x/(1+Math.abs(2*x));}ws.curve=c;o.type='sine';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(42,t+0.1);g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);o.connect(ws);ws.connect(g);g.connect(tg());o.start(t);o.stop(t+0.38);const oc=AC.createOscillator(),gc=AC.createGain();oc.type='square';oc.frequency.value=820;gc.gain.setValueAtTime(v*0.35,t);gc.gain.exponentialRampToValueAtTime(0.001,t+0.014);oc.connect(gc);gc.connect(tg());oc.start(t);oc.stop(t+0.02);}
  function snare(t,v=0.68){const g0=tg();const ns=noise(0.2),hpf=AC.createBiquadFilter(),g=AC.createGain();hpf.type='highpass';hpf.frequency.value=1600;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);ns.connect(hpf);hpf.connect(g);g.connect(g0);ns.connect(verb);ns.start(t);ns.stop(t+0.18);const o=AC.createOscillator(),og=AC.createGain();o.type='triangle';o.frequency.value=195;og.gain.setValueAtTime(v*0.38,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.07);o.connect(og);og.connect(g0);o.start(t);o.stop(t+0.09);}
  function hat(t,v=0.22,open=false){const dur=open?0.26:0.048,ns=noise(dur+0.01),hpf=AC.createBiquadFilter(),g=AC.createGain();hpf.type='highpass';hpf.frequency.value=6800;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);ns.connect(hpf);hpf.connect(g);g.connect(tg());ns.start(t);ns.stop(t+dur+0.01);}
  function clap(t,v=0.45){const g0=tg();for(let i=0;i<3;i++){const bt=t+i*0.008,ns=noise(0.13),bpf=AC.createBiquadFilter(),g=AC.createGain();bpf.type='bandpass';bpf.frequency.value=1100;bpf.Q.value=0.7;g.gain.setValueAtTime(v*(i<2?0.7:1),bt);g.gain.exponentialRampToValueAtTime(0.001,bt+0.11);ns.connect(bpf);bpf.connect(g);g.connect(g0);ns.connect(verb);ns.start(bt);ns.stop(bt+0.14);}}
  function bass(freq,t,dur,v=0.58){const g0=tg();const sub=AC.createOscillator(),saw=AC.createOscillator(),lpf=AC.createBiquadFilter(),g=AC.createGain();sub.type='sine';sub.frequency.value=freq;saw.type='sawtooth';saw.frequency.value=freq;lpf.type='lowpass';lpf.frequency.value=260;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+0.01);g.gain.setValueAtTime(v,Math.max(t+0.01,t+dur-0.04));g.gain.linearRampToValueAtTime(0,t+dur);sub.connect(g);saw.connect(lpf);lpf.connect(g);g.connect(g0);sub.start(t);sub.stop(t+dur+0.01);saw.start(t);saw.stop(t+dur+0.01);}
  function pad(freq,t,dur,v=0.11){const g0=tg();[1,1.5,2,2.67].forEach((mult,i)=>{const o=AC.createOscillator(),g=AC.createGain();o.type='sine';o.frequency.value=freq*mult;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v/Math.pow(i+1,0.8),t+0.18);g.gain.setValueAtTime(v/Math.pow(i+1,0.8),Math.max(t+0.19,t+dur-0.35));g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g);g.connect(g0);o.connect(verb);o.start(t);o.stop(t+dur+0.01);});}
  function synth(freq,t,dur,v=0.2,type='sawtooth',atk=0.018,rel=0.09){const g0=tg();const o=AC.createOscillator(),o2=AC.createOscillator(),lpf=AC.createBiquadFilter(),g=AC.createGain();lpf.type='lowpass';lpf.frequency.value=2400;lpf.Q.value=2.2;o.type=type;o.frequency.value=freq;o.detune.value=7;o2.type=type;o2.frequency.value=freq;o2.detune.value=-7;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+atk);g.gain.setValueAtTime(v,Math.max(t+atk+0.001,t+dur-rel));g.gain.linearRampToValueAtTime(0,t+dur);o.connect(lpf);o2.connect(lpf);lpf.connect(g);g.connect(g0);o.connect(verb);o.start(t);o.stop(t+dur+0.02);o2.start(t);o2.stop(t+dur+0.02);}
  function stab(freq,t,v=0.26){synth(freq,t,0.072,v,'sawtooth',0.005,0.065);}
  function reese(freq,t,dur,v=0.3){const g0=tg();const o1=AC.createOscillator(),o2=AC.createOscillator(),lpf=AC.createBiquadFilter(),g=AC.createGain();lpf.type='lowpass';lpf.frequency.value=170;lpf.Q.value=4.5;o1.type='sawtooth';o1.frequency.value=freq;o1.detune.value=0;o2.type='sawtooth';o2.frequency.value=freq;o2.detune.value=14;g.gain.setValueAtTime(v,t);g.gain.setValueAtTime(v,t+dur-0.06);g.gain.linearRampToValueAtTime(0,t+dur);o1.connect(lpf);o2.connect(lpf);lpf.connect(g);g.connect(g0);o1.start(t);o1.stop(t+dur+0.01);o2.start(t);o2.stop(t+dur+0.01);}
  const N={C2:65.4,D2:73.4,Eb2:77.8,E2:82.4,F2:87.3,G2:98,A2:110,Bb2:116.5,B2:123.5,C3:130.8,D3:146.8,Eb3:155.6,E3:164.8,F3:174.6,G3:196,A3:220,Bb3:233.1,B3:246.9,C4:261.6,D4:293.7,Eb4:311.1,E4:329.6,F4:349.2,G4:392,A4:440,Bb4:466.2,B4:493.9,C5:523.3,D5:587.3,E5:659.3,F5:698.5,G5:784,A5:880};
  function playSelect(startT){
    const bpm=96,b=60/bpm,bar=b*4,bars=8,T=startT;
    const chords=[[N.A3,N.C4,N.E4,N.G4],[N.D3,N.F3,N.A3,N.C4],[N.E3,N.G3,N.B3,N.D4],[N.C3,N.E3,N.G3,N.B3]];
    const bassRoots=[[N.A2,N.G2,N.F2,N.G2],[N.D2,N.E2,N.F2,N.G2],[N.E2,N.Eb2,N.D2,N.C2],[N.C2,N.D2,N.E2,N.G2]];
    const lick1=[[N.E5,0],[N.D5,0.25],[N.C5,0.5],[N.B4,0.75],[N.A4,1],[N.G4,1.5],[N.A4,2],[N.C5,2.25],[N.E5,2.5],[N.D5,3],[N.B4,3.5]];
    const lick2=[[N.A4,0],[N.B4,0.25],[N.C5,0.5],[N.E5,0.75],[N.D5,1.5],[N.C5,2],[N.B4,2.25],[N.A4,2.5],[N.G4,3],[N.A4,3.5]];
    for(let bi=0;bi<bars;bi++){const t=T+bi*bar,ci=Math.floor(bi/2)%4,chord=chords[ci],br=bassRoots[ci];
      kick(t,0.62);kick(t+2*b,0.48);kick(t+2.5*b,0.38);snare(t+b,0.52);snare(t+3*b,0.52);clap(t+3*b+0.01,0.22);
      [0,0.5,1,1.5,2,2.5,3,3.5].forEach((off,i)=>hat(t+off*b,0.18+(i%2?0.04:0.1)));hat(t+1.25*b,0.28,true);hat(t+3.25*b,0.26,true);
      [0,0.5,1,1.5,2,2.5,3,3.5].forEach((off,i)=>{const f=br[Math.min(i>>1,3)];bass(f,t+off*b,b*0.44,0.5);});

function DaDons(){
  const canvasRef=useRef(null),gsRef=useRef(null),keysRef=useRef({});

  const [clearMsg,setClearMsg]=useState('');
  const [finalScore,setFinalScore]=useState(0);
  const [muted,setMuted]=useState(false);
  const [audOn,setAudOn]=useState(false);

  const startAud=useCallback((t)=>{Audio.play(t);setAudOn(true);},[]);
  useEffect(()=>{if(!audOn)return;if(['title','select','clear','gameover','win'].includes(screen))Audio.play('select');else if(screen==='game')Audio.play('game');},[screen,audOn]);
  useEffect(()=>{Audio.vol(muted?0:0.7);},[muted]);

  const rHud=useCallback((gs)=>{const p=gs.player;setHud({score:gs.score,lives:gs.lives,hp:p.hp,maxHp:p.maxHp,stage:gs.stage,combo:gs.comboCount,weapon:p.hasWeapon?p.weaponType:null,specialCd:p.specialCd});},[]);

  const update=useCallback((gs)=>{
    const k=keysRef.current,t=touchRef.current,p=gs.player,ch=CHARS[gs.ci];
    if(gs.stageClearT>0){gs.stageClearT--;if(gs.stageClearT===0){if(gs.stage>=STAGES.length-1){setFinalScore(gs.score);setScreen('win');}else{setClearMsg(STAGES[gs.stage+1].name);setScreen('clear');}}uPts(gs);return;}
    const L=k.ArrowLeft||k.KeyA||t.left,R=k.ArrowRight||k.KeyD||t.right;
    const U=k.ArrowUp||k.KeyW||t.up,D=k.ArrowDown||k.KeyS||t.down;
    const pnch=k.KeyJ||k.KeyQ||t.punch,kk=k.KeyK||k.KeyE||t.kick;
    const jmp=k.Space||k.KeyF||t.jump,sp=k.KeyG||k.KeyT||t.special;
    if(p.invT>0)p.invT--;
    if(p.hasWeapon){p.weaponT--;if(p.weaponT<=0){p.hasWeapon=false;p.weaponType=null;}}
    if(p.specialCd>0)p.specialCd--;if(p.specialActive>0)p.specialActive--;
    const canAct=p.state!=='dead'&&p.state!=='hurt'&&p.stateT===0;
    if(canAct){
      if(L){p.vx=-ch.spd;p.facing=-1;}else if(R){p.vx=ch.spd;p.facing=1;}else p.vx=0;
      if(U)p.y=Math.max(FLOOR_TOP+p.h,p.y-1.4);if(D)p.y=Math.min(FLOOR_BOT,p.y+1.4);
      if(jmp&&p.onGround&&!p.jumpLock){p.vy=JUMP_V;p.onGround=false;p.jumpLock=true;}if(!jmp)p.jumpLock=false;
      if(pnch&&!p.atkLock&&p.stateT===0){p.state=p.hasWeapon?'weapon':'punch';p.stateT=16;p.atkLock=true;gs.comboTimer=60;}
      if(kk&&!p.atkLock&&p.stateT===0){p.state='kick';p.stateT=16;p.atkLock=true;gs.comboTimer=60;}
      if(!pnch&&!kk)p.atkLock=false;
      if(sp&&p.specialCd===0){p.specialActive=40;p.specialCd=300;p.state='special';p.stateT=40;
        spFX(gs.particles,p.x-gs.scrollX,p.y-8,ch.col,20,ch.sp);
        gs.enemies.forEach(e=>{if(e.state==='dead')return;const sx=e.x-gs.scrollX;if(sx>-20&&sx<GW+20){e.hp-=3;e.stunT=30;if(e.hp<=0){e.state='dead';gs.score+=e.isBoss?2000:300;if(e.isBoss)gs.bossDefeated=true;}}});}

      // ── AUTO WEAPON PICKUP: walk over it ────────────────────────
      // (No button needed — just get close and it's yours)
      if(!p.hasWeapon){
        gs.weapons.forEach(w=>{
          if(!w.taken && Math.abs(w.x-p.x)<20 && Math.abs(w.y-p.y)<14){
            w.taken=true;p.hasWeapon=true;p.weaponT=w.type.dur;p.weaponType=w.type;
            spFX(gs.particles,p.x-gs.scrollX,p.y-14,w.type.col,6,'GRAB '+w.type.name+'!');
          }
        });
      }

      if(p.vx!==0&&p.stateT===0){p.frameT++;if(p.frameT>7){p.frame=1-p.frame;p.frameT=0;}p.state='walk';}
      else if(p.stateT===0&&p.state==='walk')p.state='idle';
    }
    if(p.stateT>0)p.stateT--;
    if(p.stateT===0&&['punch','kick','weapon','special'].includes(p.state))p.state='idle';
    if(p.state==='hurt'&&p.stateT===0)p.state='idle';
    if(!p.onGround){p.vy+=GRAV;p.y+=p.vy;}p.x+=p.vx;
    if(p.y>=GROUND_Y){p.y=GROUND_Y;p.vy=0;p.onGround=true;}
    p.x=Math.max(gs.scrollX+8,Math.min(gs.scrollX+GW-8,p.x));
    const tgt=p.x-100;if(tgt>gs.scrollX)gs.scrollX=Math.min(tgt,gs.stageLen-GW);gs.scrollX=Math.max(0,gs.scrollX);
    const atkA=['punch','kick','weapon','special'].includes(p.state)&&p.stateT>6;
    const rch=p.state==='kick'?20:p.state==='weapon'?22:16;
    let aBox=atkA?{x:p.facing>0?p.x+2:p.x-rch-2,y:p.y-p.h+2,w:rch,h:13}:null;
    if(gs.comboTimer>0){gs.comboTimer--;if(gs.comboTimer===0)gs.comboCount=0;}
    gs.enemies.forEach(e=>{
      if(e.state==='dead')return;if(e.stunT>0){e.stunT--;return;}
      if(Math.abs(e.x-(gs.scrollX+GW/2))>GW)return;
      if(!e.onGround){e.vy+=GRAV;e.y+=e.vy;}e.x+=e.vx*0.75;
      if(e.y>=GROUND_Y){e.y=GROUND_Y;e.vy=0;e.onGround=true;}e.y=Math.max(FLOOR_TOP+e.h,Math.min(FLOOR_BOT,e.y));
      if(e.state==='hurt'){if(--e.stateTimer<=0)e.state='walk';return;}
      const dx=p.x-e.x,dy=p.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);e.facing=dx>0?1:-1;
      if(--e.attackCd<=0&&dist<22&&p.state!=='dead'){e.attackCd=70+Math.random()*70;if(p.invT===0){const dm=e.isBoss?2:1;p.hp-=dm;p.invT=45;p.state='hurt';p.stateT=18;p.vx=-e.facing*2;spFX(gs.particles,p.x-gs.scrollX,p.y-8,P.YLW,4,`-${dm}`);if(p.hp<=0){p.state='dead';p.hp=0;}}}
      else if(dist>16){e.vx=(dx/dist)*(e.isBoss?1.4:1.1);e.y+=(dy/dist)*0.6;e.state='walk';e.frameT=(e.frameT||0)+1;if(e.frameT>8){e.frame=1-(e.frame||0);e.frameT=0;}}
      else{e.vx=0;e.state='idle';}

      <div style={{color:'#1a1a1a',fontSize:8,marginTop:2,letterSpacing:1,textAlign:'center'}}>J=PUNCH · K=KICK · SPACE=JUMP · G=SPECIAL · WALK OVER WEAPONS TO GRAB</div>
    </div>
  );
}

function DBt({l,onTouchStart,onTouchEnd,onMouseDown,onMouseUp,onMouseLeave}){return <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave} style={{width:44,height:44,background:'#111',border:'2px solid #333',display:'flex',alignItems:'center',justifyContent:'center',color:'#777',fontSize:14,cursor:'pointer',borderRadius:4,userSelect:'none',WebkitUserSelect:'none',fontFamily:'monospace'}}>{l}</div>;}
function ABt({l,c,onTouchStart,onTouchEnd,onMouseDown,onMouseUp,onMouseLeave}){return <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} onMouseUp={onMouseUp} onMouseLeave={onMouseLeave} style={{width:58,height:44,background:`${c}22`,border:`2px solid ${c}`,display:'flex',alignItems:'center',justifyContent:'center',color:c,fontSize:9,cursor:'pointer',borderRadius:6,fontFamily:'Courier New,monospace',fontWeight:'bold',letterSpacing:1,userSelect:'none',WebkitUserSelect:'none',boxShadow:`0 0 6px ${c}55`}}>{l}</div>;}
function SBar({label,v,max,col}){return <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}><div style={{color:'#444',fontSize:6,fontFamily:'monospace'}}>{label}</div><div style={{width:14,height:22,background:'#111',border:'1px solid #222',borderRadius:2,display:'flex',flexDirection:'column-reverse'}}><div style={{width:'100%',height:`${(v/max)*100}%`,background:col,borderRadius:2}}/></div></div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<DaDons/>);
